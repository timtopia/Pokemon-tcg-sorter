<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon TCG Sorter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Pokemon TCG Sorter</h1>
  </header>

  <main>
    <section id="sets-panel">
      <div class="panel-header">
        <h2>Sets</h2>
      </div>
      <div id="overall-progress" class="overall-progress"></div>
      <div id="sets-list"></div>
    </section>

    <section id="cards-panel" class="hidden">
      <div class="panel-header">
        <h2 id="cards-title">Cards</h2>
        <span id="cards-progress" class="progress-label"></span>
      </div>
      <button id="back-btn" class="hidden"></button>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="collected">Collected</button>
        <button class="filter-btn" data-filter="missing">Missing</button>
      </div>
      <div id="cards-list" class="cards-grid"></div>
      <button id="back-btn-float" class="btn btn-float">Back to Sets</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
