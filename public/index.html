<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon TCG Sorter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Pokemon TCG Sorter</h1>
  </header>

  <main>
    <section id="sets-panel">
      <div class="panel-header">
        <h2>Sets</h2>
      </div>
      <div id="sets-list"></div>
    </section>

    <section id="cards-panel" class="hidden">
      <div class="panel-header">
        <h2 id="cards-title">Cards</h2>
        <span id="cards-progress" class="progress-label"></span>
        <button id="back-btn" class="btn btn-secondary">Back</button>
      </div>
      <ul id="cards-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
